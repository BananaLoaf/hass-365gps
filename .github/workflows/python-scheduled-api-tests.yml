name: Python Scheduled API Tests

on:
  schedule:
    - cron: '30 8 * * 1'
      timezone: "Etc/UTC"
  workflow_dispatch:

jobs:
  test-api:
    name: test-api
    runs-on: ubuntu-latest
    environment: python-scheduled-api-tests

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --all-extras

      - name: Test
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: uv run pytest tests/test_api.py::TestAPI -v
