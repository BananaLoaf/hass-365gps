name: Python CI

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python-ci:
    uses: BananaLoaf/ci-cd/.github/workflows/python-ci.yml@master
    with:
      ruff-check-options: custom_components/365gps tests/
      ruff-format-options: custom_components/365gps tests/
      skip-typecheck: true
      pytest-options: -v

  test-api:
    name: test-api
    runs-on: ubuntu-latest
    needs: python-ci
    environment: python-scheduled-api-tests

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --all-extras

      - name: Test
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: uv run pytest tests/test_api.py::TestAPI -v

  python-build:
    uses: BananaLoaf/ci-cd/.github/workflows/python-build.yml@master
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master' || github.base_ref == 'master'
    name: python-build
    needs: test-api
    with:
      cibuildwheel: false
